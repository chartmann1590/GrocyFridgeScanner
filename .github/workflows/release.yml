name: Build & Release APK

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Auto-increment versionCode
        id: version
        run: |
          BUILD_FILE="app/build.gradle.kts"

          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K\d+' "$BUILD_FILE")
          NEW_CODE=$((CURRENT_CODE + 1))

          sed -i -E "s/versionCode[[:space:]]*=[[:space:]]*[0-9]+/versionCode = $NEW_CODE/" "$BUILD_FILE"

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$BUILD_FILE")
          NEW_NAME="${CURRENT_NAME%.*}.$NEW_CODE"

          sed -i -E "s/versionName[[:space:]]*=[[:space:]]*\"[^\"]+\"/versionName = \"$NEW_NAME\"/" "$BUILD_FILE"

          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"

          echo "Updated: versionCode=$NEW_CODE, versionName=$NEW_NAME"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
          AD_MOB_APP_ID: ${{ secrets.AD_MOB_APP_ID }}
          AD_MOB_BANNER_ID: ${{ secrets.AD_MOB_BANNER_ID }}
          AD_MOB_INTERSTITIAL_ID: ${{ secrets.AD_MOB_INTERSTITIAL_ID }}
        run: ./gradlew assembleRelease

      - name: Build signed release bundle
        env:
          KEYSTORE_FILE: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
          AD_MOB_APP_ID: ${{ secrets.AD_MOB_APP_ID }}
          AD_MOB_BANNER_ID: ${{ secrets.AD_MOB_BANNER_ID }}
          AD_MOB_INTERSTITIAL_ID: ${{ secrets.AD_MOB_INTERSTITIAL_ID }}
        run: ./gradlew bundleRelease

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Release v${{ steps.version.outputs.version_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
